<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dusit Load Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<div class="header">
<img src="logo.png" class="logo">
<div>
<h1>Dusit Load Calculator</h1>
<p>Automation & Industrial Electrical Calculator</p>
</div>
</div>

<div class="card">
<h2>ตั้งค่าการคำนวณ</h2>

<div class="grid">

<div>
<label>ประเภทโหลด</label>
<select id="loadType" onchange="togglePF()">
<option value="R">R Load (Resistive)</option>
<option value="L">L Load (Inductive)</option>
</select>
</div>

<div>
<label>ระบบไฟฟ้า</label>
<select id="phase">
<option value="1">1 Phase</option>
<option value="3">3 Phase</option>
</select>
</div>

<div>
<label>ตัวแปร</label>
<select id="mode" onchange="updateInputLabel()">
<option value="amp">Amp (A)</option>
<option value="kw">kW</option>
<option value="hp">HP</option>
</select>
</div>

<div>
<label>Voltage (V)</label>
<input type="number" id="voltage" value="400">
</div>

<div>
<label id="inputLabel">Current (A)</label>
<input type="number" id="inputValue" value="10">
</div>

<div>
<label>Power Factor</label>
<input type="number" id="pf" value="1" step="0.01">
</div>

<div>
<label>Overload (%)</label>
<input type="number" id="overloadPercent" value="125">
</div>

</div>

<div class="button-row">
<button onclick="calculate()">คำนวณ</button>
<button onclick="addLoad()">+ เพิ่มโหลด</button>
</div>

</div>

<div class="result-grid">

<div class="result-card">
<div>Amp</div>
<div class="big" id="resultAmp">0.00 A</div>
</div>

<div class="result-card">
<div>kW</div>
<div class="big" id="resultKw">0.00 kW</div>
</div>

<div class="result-card">
<div>HP</div>
<div class="big" id="resultHp">0.00 HP</div>
</div>

<div class="result-card">
<div>Overload</div>
<div class="big" id="resultOverload">0.00 A</div>
</div>

<div class="result-card">
<div>Recommended Cable</div>
<div class="big" id="resultCable">2.5 mm²</div>
</div>

</div>

<div class="spacer"></div>

<div class="card">
<div class="table-head">
<h2>รายการโหลด</h2>
<button class="danger" onclick="clearLoads()">ลบทั้งหมด</button>
</div>

<table>
<thead>
<tr>
<th>#</th>
<th>Amp</th>
<th>kW</th>
<th>HP</th>
<th>Overload</th>
<th>Cable</th>
<th>ลบ</th>
</tr>
</thead>
<tbody id="loadTable"></tbody>
</table>
</div>

<div class="spacer"></div>

<div class="card">
<h2>Load รวม</h2>

<div class="result-grid">

<div class="result-card">
<div>Total Amp</div>
<div class="big" id="sumAmp">0.00 A</div>
</div>

<div class="result-card">
<div>Total kW</div>
<div class="big" id="sumKw">0.00 kW</div>
</div>

<div class="result-card">
<div>Total HP</div>
<div class="big" id="sumHp">0.00 HP</div>
</div>

</div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
